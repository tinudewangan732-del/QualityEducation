<!DOCTYPE html>
<html>
<head>
  <title>AI Tutor</title>
  <style>
    body { font-family: Arial; background:#eef; text-align:center; }
    .chat-box {
      width: 400px; margin: auto; background:#fff;
      padding: 15px; border-radius:10px;
    }
    #messages {
      height: 300px;
      overflow-y: auto;
      text-align: left;
      border:1px solid #ccc;
      padding:10px;
      margin-bottom:10px;
    }
    input {
      width: 75%;
      padding: 10px;
    }
    button {
      padding: 10px;
    }
  </style>
</head>
<body>

<div class="chat-box">
  <h2>🎓 AI Tutor</h2>

  <div id="messages"></div>

  <input type="text" id="userInput" placeholder="Ask your question...">
  <button onclick="sendMessage()">Send</button>

  <br><br>

  <button onclick="quick('Give study tips')">📚 Study Tips</button>
  <button onclick="quick('Give quiz question')">❓ Quiz</button>
</div>

<script>
function addMessage(text, sender){
  let msg = document.createElement("p");
  msg.innerHTML = "<b>" + sender + ":</b> " + text;
  document.getElementById("messages").appendChild(msg);
}

function sendMessage(){
  let input = document.getElementById("userInput").value;

  addMessage(input, "You");

  fetch("http://127.0.0.1:5000/api", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ message: input })
  })
  .then(res=>res.json())
  .then(data=>{
    addMessage(data.reply, "AI");
  });

  document.getElementById("userInput").value = "";
}

function quick(text){
  document.getElementById("userInput").value = text;
  sendMessage();
}
</script>

</body>
</html>
